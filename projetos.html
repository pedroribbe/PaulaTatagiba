  <div id="page-overlay" style="position:fixed;inset:0;background:rgba(250,249,248,0.97);backdrop-filter:blur(14px);-webkit-backdrop-filter:blur(14px);z-index:9999;opacity:1;pointer-events:none;transition:opacity 1.2s ease;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:1.5rem;will-change:opacity;">
  <span style="font-family:Manrope,sans-serif;font-weight:300;font-size:1rem;letter-spacing:0.25em;text-transform:uppercase;color:#2f3333;">Tatagiba Arquitetura</span>
  <div style="width:24px;height:1px;background:#afb3b2;"></div>
</div><div style="width:32px;height:1px;background:#A4A693;opacity:.5;"></div>
    </div>
  </div>
  <style>@keyframes pulse-logo{0%,100%{opacity:1}50%{opacity:.45}}</style>

  <script>
    document.getElementById('menu-btn').addEventListener('click', function () {
      document.getElementById('mobile-menu').classList.toggle('hidden');
    });

    const overlay = document.getElementById('page-overlay');
function hideOverlay() {
      overlay.style.opacity = '0';
      setTimeout(() => { overlay.style.display = 'none'; }, 700);
    }
    const _overlayTimeout = setTimeout(hideOverlay, 6000);

    document.addEventListener('click', function (e) {
      const link = e.target.closest('a[href]');
      if (!link) return;
      const href = link.getAttribute('href');
      if (href && !href.startsWith('#') && !href.startsWith('http') && !href.startsWith('tel') && !href.startsWith('mailto')) {
        e.preventDefault();
        overlay.style.display = 'flex';
        overlay.style.opacity = '1';
        overlay.style.pointerEvents = 'all';
        setTimeout(() => { window.location.href = href; }, 420);
      }
    });

    // Layout editorial por posição
    const layouts = [
      { cols: 'md:col-span-4', aspect: 'aspect-[16/10]', extra: '' },
      { cols: 'md:col-span-2', aspect: 'aspect-[4/3] md:aspect-[4/5]', extra: 'md:mt-24' },
      { cols: 'md:col-span-2', aspect: 'aspect-[4/3] md:aspect-[1/1]', extra: '' },
      { cols: 'md:col-span-2', aspect: 'aspect-[4/3] md:aspect-[1/1]', extra: 'md:-mt-12' },
      { cols: 'md:col-span-2', aspect: 'aspect-[4/3] md:aspect-[1/1]', extra: '' },
      { cols: 'md:col-span-6', aspect: 'aspect-[16/9] md:aspect-[21/9]', extra: 'mt-2 md:mt-8' },
      { cols: 'md:col-span-3', aspect: 'aspect-[4/3] md:aspect-[16/10]', extra: '' },
      { cols: 'md:col-span-3', aspect: 'aspect-[4/3] md:aspect-[16/10]', extra: '' },
    ];
    const extraLayouts = [
      { cols: 'md:col-span-2', aspect: 'aspect-[4/3] md:aspect-[1/1]', extra: 'mt-2 md:mt-8' },
      { cols: 'md:col-span-4', aspect: 'aspect-[16/10]', extra: 'mt-2 md:mt-8' },
      { cols: 'md:col-span-3', aspect: 'aspect-[4/3] md:aspect-[16/10]', extra: 'mt-2' },
      { cols: 'md:col-span-3', aspect: 'aspect-[4/3] md:aspect-[16/10]', extra: 'mt-2' },
    ];
    const catLabel = { residencial: 'Residencial', comercial: 'Comercial', infantil: 'Infantil' };

    function getLayout(i) {
      return i < layouts.length ? layouts[i] : extraLayouts[(i - layouts.length) % extraLayouts.length];
    }



  </script>

  <script type="module">
    import { initializeApp } from 'https://www.gstatic.com/firebasejs/11.0.0/firebase-app.js';
    import { getFirestore, doc, getDoc } from 'https://www.gstatic.com/firebasejs/11.0.0/firebase-firestore.js';

    const app = initializeApp({
      apiKey:            "AIzaSyBo0HJWT_OMe6SkBIcQ0gmHoym-I8wDpyw",
      authDomain:        "tatagiba-arquitetura.firebaseapp.com",
      projectId:         "tatagiba-arquitetura",
      storageBucket:     "tatagiba-arquitetura.firebasestorage.app",
      messagingSenderId: "649936737333",
      appId:             "1:649936737333:web:661bae2f86310a8c128d7c",
    });
    const db = getFirestore(app);

    try {
      const snap = await getDoc(doc(db, 'settings', 'projects'));
      const data = snap.data() || {};
      const projects = data.projects || [];
      const grid = document.getElementById('projects-grid');

      const layouts = [
        { cols: 'md:col-span-4', aspect: 'aspect-[16/10]', extra: '' },
        { cols: 'md:col-span-2', aspect: 'aspect-[4/3] md:aspect-[4/5]', extra: 'md:mt-24' },
        { cols: 'md:col-span-2', aspect: 'aspect-[4/3] md:aspect-[1/1]', extra: '' },
        { cols: 'md:col-span-2', aspect: 'aspect-[4/3] md:aspect-[1/1]', extra: 'md:-mt-12' },
        { cols: 'md:col-span-2', aspect: 'aspect-[4/3] md:aspect-[1/1]', extra: '' },
        { cols: 'md:col-span-6', aspect: 'aspect-[16/9] md:aspect-[21/9]', extra: 'mt-2 md:mt-8' },
        { cols: 'md:col-span-3', aspect: 'aspect-[4/3] md:aspect-[16/10]', extra: '' },
        { cols: 'md:col-span-3', aspect: 'aspect-[4/3] md:aspect-[16/10]', extra: '' },
      ];
      const extraLayouts = [
        { cols: 'md:col-span-2', aspect: 'aspect-[4/3] md:aspect-[1/1]', extra: 'mt-2 md:mt-8' },
        { cols: 'md:col-span-4', aspect: 'aspect-[16/10]', extra: 'mt-2 md:mt-8' },
        { cols: 'md:col-span-3', aspect: 'aspect-[4/3] md:aspect-[16/10]', extra: 'mt-2' },
        { cols: 'md:col-span-3', aspect: 'aspect-[4/3] md:aspect-[16/10]', extra: 'mt-2' },
      ];
      const catLabel = { residencial: 'Residencial', comercial: 'Comercial', infantil: 'Infantil' };

      function getLayout(i) {
        return i < layouts.length ? layouts[i] : extraLayouts[(i - layouts.length) % extraLayouts.length];
      }

      function esc(s) { return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;'); }
      function buildCard(p, i) {
        const l = getLayout(i);
        const pid = encodeURIComponent(p.id || '');
        const href = pid ? `projeto.html?id=${pid}` : `projeto.html?i=${i}`;
        return `<a href="${href}" class="${l.cols} ${l.extra} project-card relative overflow-hidden ${l.aspect}" data-category="${esc(p.category)}">
          <img alt="${esc(p.name)}" class="w-full h-full object-cover transition-transform duration-700 hover:scale-105" src="${esc(p.image)}"/>
          <div class="project-overlay absolute inset-0 bg-[#D2C2AC]/50 opacity-0 transition-opacity duration-500 flex flex-col items-center justify-center text-center p-4 sm:p-8 backdrop-blur-[2px]">
            <span class="font-body font-light text-xs tracking-[0.3em] uppercase text-on-surface mb-2">${esc(catLabel[p.category] || p.category)}</span>
            <h3 class="font-headline font-bold text-xl sm:text-2xl tracking-wide text-on-surface uppercase">${esc(p.name)}</h3>
          </div>
        </a>`;
      }

      grid.innerHTML = projects.map((p, i) => buildCard(p, i)).join('');

      // Espera todas as imagens do grid carregarem
      await Promise.all(Array.from(grid.querySelectorAll('img')).filter(img => !img.complete || !img.naturalWidth).map(img =>
        new Promise(res => {
          img.addEventListener('load',  res, { once: true });
          img.addEventListener('error', res, { once: true });
          setTimeout(res, 12000);
        })
      ));

      const filterBtns = document.querySelectorAll('.filter-btn');
      let cards = Array.from(grid.querySelectorAll('[data-category]'));
      let filterTimeout = null;

      filterBtns.forEach(btn => {
        btn.addEventListener('click', function () {
          if (filterTimeout) clearTimeout(filterTimeout);
          const filter = this.dataset.filter;

          filterBtns.forEach(b => {
            b.classList.remove('text-primary', 'border-b-2', 'border-primary');
            b.classList.add('text-on-surface-variant');
          });
          this.classList.add('text-primary', 'border-b-2', 'border-primary');
          this.classList.remove('text-on-surface-variant');

          const toHide = cards.filter(c => filter !== 'all' && c.dataset.category !== filter);
          const toShow = cards.filter(c => filter === 'all' || c.dataset.category === filter);

          toHide.forEach(card => {
            card.style.opacity = '0';
            card.style.transform = 'scale(0.96)';
            card.style.pointerEvents = 'none';
          });

          filterTimeout = setTimeout(() => {
            toHide.forEach(card => {
              card.style.display = 'none';
              card.style.opacity = '';
              card.style.transform = '';
              card.style.pointerEvents = '';
            });
            toShow.forEach((card, i) => {
              if (card.style.display === 'none') {
                card.style.display = '';
                card.style.opacity = '0';
                card.style.transform = 'translateY(14px) scale(0.97)';
                card.offsetHeight;
                setTimeout(() => { card.style.opacity = ''; card.style.transform = ''; }, i * 60);
              }
            });
          }, 320);
        });
      });
    } catch (e) {
      console.warn('Firebase:', e);
    } finally {
      clearTimeout(_overlayTimeout);
      hideOverlay();
    }
  </script>
</body>
