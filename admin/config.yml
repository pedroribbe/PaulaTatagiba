backend:
  name: git-gateway
  branch: master

locale: pt

media_folder: "uploads"
public_folder: "/uploads"

collections:
  - name: "projects"
    label: "Projetos"
    files:
      - name: "projects_list"
        label: "Lista de Projetos"
        file: "data/projects.json"
        format: json
        fields:
          - name: projects
            label: Projetos
            label_singular: Projeto
            widget: list
            fields:
              - name: id
                label: "ID (sem acentos, com hífens)"
                widget: string
                hint: "Ex: casa-itanhanga — usado internamente, não aparece no site"
              - name: name
                label: Nome do Projeto
                widget: string
              - name: category
                label: Categoria
                widget: select
                options:
                  - { label: Residencial, value: residencial }
                  - { label: Comercial, value: comercial }
                  - { label: Infantil, value: infantil }
              - name: image
                label: Foto Principal
                widget: image
                hint: "Faça o upload da foto aqui. Formatos aceitos: JPG, PNG, WEBP."
              - name: featured
                label: Destaque na Home
                widget: boolean
                default: false
                hint: "Marque para exibir na seção de projetos selecionados da página inicial (máx. 4)"
