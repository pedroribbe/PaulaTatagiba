    © 2025 Tatagiba Arquitetura. Todos os direitos reservados.
  </div>
</footer>

<div id="page-overlay" style="position:fixed;inset:0;background:#faf9f8;z-index:9999;opacity:1;pointer-events:none;transition:opacity 0.45s ease;"></div>

<script>
  document.getElementById('menu-btn').addEventListener('click', function() {
    document.getElementById('mobile-menu').classList.toggle('hidden');
  });

  // Page transition
  const overlay = document.getElementById('page-overlay');
  requestAnimationFrame(() => requestAnimationFrame(() => { overlay.style.opacity = '0'; }));
  document.querySelectorAll('a[href]').forEach(link => {
    const href = link.getAttribute('href');
    if (href && !href.startsWith('#') && !href.startsWith('http') && !href.startsWith('tel') && !href.startsWith('mailto')) {
      link.addEventListener('click', function(e) {
        e.preventDefault();
        overlay.style.opacity = '1';
        overlay.style.pointerEvents = 'all';
        setTimeout(() => { window.location.href = href; }, 420);
      });
    }
  });

  // Carregar dados do projeto
  const params = new URLSearchParams(window.location.search);
  const projectId = params.get('id');

  const catLabel = { residencial: 'Residencial', comercial: 'Comercial', infantil: 'Infantil' };

  fetch('data/projects.json')
    .then(r => r.json())
    .then(data => {
      const project = (data.projects || []).find(p => p.id === projectId);
      if (!project) { window.location.href = 'projetos.html'; return; }

      document.title = `${project.name} | Tatagiba Arquitetura`;
      document.getElementById('proj-name').textContent = project.name;
      document.getElementById('proj-category').textContent = catLabel[project.category] || project.category;

      const images = (project.images && project.images.length) ? project.images : [project.image];
      const gallery = document.getElementById('proj-gallery');

      // Primeira imagem: full width, alta
      // A partir da segunda: pares lado a lado; ímpares sozinhos full width
      let html = '';
      images.forEach((src, i) => {
        const imgSrc = typeof src === 'object' ? src.src : src;
        const imgTag = `<img src="${imgSrc}" alt="${project.name}" class="w-full h-auto block" loading="${i === 0 ? 'eager' : 'lazy'}"/>`;

        if (i === 0) {
          html += `<div class="w-full overflow-hidden">${imgTag}</div>`;
        } else if (i % 2 === 1) {
          const next = images[i + 1];
          if (next) {
            const nextSrc = typeof next === 'object' ? next.src : next;
            html += `<div class="grid grid-cols-1 md:grid-cols-2 gap-4 md:gap-6">
              <div class="overflow-hidden"><img src="${imgSrc}" alt="${project.name}" class="w-full h-auto block" loading="lazy"/></div>
              <div class="overflow-hidden"><img src="${nextSrc}" alt="${project.name}" class="w-full h-auto block" loading="lazy"/></div>
            </div>`;
          } else {
            html += `<div class="w-full overflow-hidden">${imgTag}</div>`;
          }
        } else if (i % 2 === 0 && i !== 0) {
          // Já foi tratado como par acima; pula
        }
      });

      gallery.innerHTML = html;
    });
</script>
