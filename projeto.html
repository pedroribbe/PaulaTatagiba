  }
  #lightbox-close {
    position: absolute; top: 1rem; right: 1.25rem;
    background: none; border: none; cursor: pointer;
    color: #fff; font-size: 2rem; line-height: 1; opacity: .7;
  }
  #lightbox-close:hover { opacity: 1; }
  #lightbox-prev, #lightbox-next {
    position: absolute; top: 50%; transform: translateY(-50%);
    background: rgba(255,255,255,.08); border: none; cursor: pointer;
    color: #fff; padding: 1rem .85rem; transition: background .2s;
  }
  #lightbox-prev { left: .5rem; }
  #lightbox-next { right: .5rem; }
  #lightbox-prev:hover, #lightbox-next:hover { background: rgba(255,255,255,.18); }
  #lightbox-counter {
    position: absolute; bottom: 1rem; left: 50%; transform: translateX(-50%);
    color: rgba(255,255,255,.5); font-size: .75rem; letter-spacing: .12em;

<!-- Lightbox -->
<div id="lightbox">
  <button id="lightbox-close">✕</button>
  <button id="lightbox-prev"><span class="material-symbols-outlined">arrow_back_ios</span></button>

  <button id="lightbox-next"><span class="material-symbols-outlined">arrow_forward_ios</span></button>
  <span id="lightbox-counter"></span>

<div id="page-overlay" style="position:fixed;inset:0;background:#faf9f8;z-index:9999;opacity:1;pointer-events:none;transition:opacity 0.45s ease;"></div>

<script>
  document.getElementById('menu-btn').addEventListener('click', function() {
    document.getElementById('mobile-menu').classList.toggle('hidden');
  });

  // Page transition
  const overlay = document.getElementById('page-overlay');
  requestAnimationFrame(() => requestAnimationFrame(() => { overlay.style.opacity = '0'; }));
  document.querySelectorAll('a[href]').forEach(link => {
    const href = link.getAttribute('href');
    if (href && !href.startsWith('#') && !href.startsWith('http') && !href.startsWith('tel') && !href.startsWith('mailto')) {
      link.addEventListener('click', function(e) {
        e.preventDefault();
        overlay.style.opacity = '1';
        overlay.style.pointerEvents = 'all';
        setTimeout(() => { window.location.href = href; }, 420);
      });
    }
  });

</script>

<script type="module">
  import { initializeApp } from 'https://www.gstatic.com/firebasejs/11.0.0/firebase-app.js';
  import { getFirestore, doc, getDoc } from 'https://www.gstatic.com/firebasejs/11.0.0/firebase-firestore.js';

  const app = initializeApp({
    apiKey:            "AIzaSyBo0HJWT_OMe6SkBIcQ0gmHoym-I8wDpyw",
    authDomain:        "tatagiba-arquitetura.firebaseapp.com",
    projectId:         "tatagiba-arquitetura",
    storageBucket:     "tatagiba-arquitetura.firebasestorage.app",
    messagingSenderId: "649936737333",
    appId:             "1:649936737333:web:661bae2f86310a8c128d7c",
  });
  const db = getFirestore(app);

  const params    = new URLSearchParams(window.location.search);
  const projectId = params.get('id');
  const catLabel  = { residencial: 'Residencial', comercial: 'Comercial', infantil: 'Infantil' };

  try {
    const snap = await getDoc(doc(db, 'settings', 'projects'));
    const data  = snap.data() || {};
    const project = (data.projects || []).find(p => p.id === projectId);
    if (!project) { window.location.href = 'projetos.html'; }

    document.title = `${project.name} | Tatagiba Arquitetura`;
    document.getElementById('proj-name').textContent     = project.name;
    document.getElementById('proj-category').textContent = catLabel[project.category] || project.category;

    function esc(s) { return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;'); }

    const images  = (project.images && project.images.length) ? project.images : [project.image];
    const gallery = document.getElementById('proj-gallery');
    let html = '';

    images.forEach((src, i) => {
      const imgSrc = esc(typeof src === 'object' ? src.src : src);
      const altTxt = esc(project.name);
      if (i === 0) {
        html += `<div class="w-full overflow-hidden" style="max-height:85vh"><img src="${imgSrc}" alt="${altTxt}" class="w-full h-full object-cover block lb-trigger" style="max-height:85vh" data-lb="${i}" loading="eager"/></div>`;
      } else if (i % 2 === 1) {
        const next    = images[i + 1];
        const nextSrc = next ? esc(typeof next === 'object' ? next.src : next) : null;
        if (nextSrc) {
          html += `<div class="grid grid-cols-1 sm:grid-cols-2 gap-4 md:gap-6" style="height:55vh">
            <div class="overflow-hidden h-full"><img src="${imgSrc}" alt="${altTxt}" class="w-full h-full object-cover block lb-trigger" data-lb="${i}" loading="lazy"/></div>
            <div class="overflow-hidden h-full"><img src="${nextSrc}" alt="${altTxt}" class="w-full h-full object-cover block lb-trigger" data-lb="${i+1}" loading="lazy"/></div>
          </div>`;
        } else {
          html += `<div class="w-full overflow-hidden" style="max-height:75vh"><img src="${imgSrc}" alt="${altTxt}" class="w-full h-full object-cover block lb-trigger" style="max-height:75vh" data-lb="${i}" loading="lazy"/></div>`;
        }
      }
    });

    gallery.innerHTML = html;

    // ── Lightbox ──────────────────────────────────────────────────
    const allSrcs = images.map(s => typeof s === 'object' ? s.src : s);
    const lb      = document.getElementById('lightbox');
    const lbImg   = document.getElementById('lightbox-img');
    const lbCnt   = document.getElementById('lightbox-counter');
    let cur = 0;

    function lbOpen(idx) {
      cur = idx;
      lbImg.src = allSrcs[cur];
      lbCnt.textContent = `${cur + 1} / ${allSrcs.length}`;
      lb.classList.add('open');
      document.body.style.overflow = 'hidden';
    }
    function lbClose() {
      lb.classList.remove('open');
      document.body.style.overflow = '';
    }
    function lbGo(dir) {
      cur = (cur + dir + allSrcs.length) % allSrcs.length;
      lbImg.src = allSrcs[cur];
      lbCnt.textContent = `${cur + 1} / ${allSrcs.length}`;
    }

    gallery.querySelectorAll('.lb-trigger').forEach(img => {
      img.addEventListener('click', () => lbOpen(+img.dataset.lb));
    });
    document.getElementById('lightbox-close').addEventListener('click', lbClose);
    document.getElementById('lightbox-prev').addEventListener('click', () => lbGo(-1));
    document.getElementById('lightbox-next').addEventListener('click', () => lbGo(1));
    lb.addEventListener('click', e => { if (e.target === lb) lbClose(); });
    document.addEventListener('keydown', e => {
      if (!lb.classList.contains('open')) return;
      if (e.key === 'Escape')     lbClose();
      if (e.key === 'ArrowLeft')  lbGo(-1);
      if (e.key === 'ArrowRight') lbGo(1);
    });

    // Swipe mobile
    let touchStartX = 0;
    lb.addEventListener('touchstart', e => { touchStartX = e.touches[0].clientX; }, { passive: true });
    lb.addEventListener('touchend', e => {
      const diff = touchStartX - e.changedTouches[0].clientX;
      if (Math.abs(diff) > 50) lbGo(diff > 0 ? 1 : -1);
    });
  } catch (e) {
    console.warn('Firebase:', e);
  }
</script>
</body>
